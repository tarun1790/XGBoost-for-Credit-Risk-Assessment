version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: agent-postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_agent_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent-fastapi-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/agent_db
      - CHROMADB_DIR=/app/data/chroma
      - SCREENSHOTS_DIR=/app/data/screenshots
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - agent_screenshots:/app/data/screenshots
      - agent_chroma:/app/data/chroma
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agent-react-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_agent_data:
  agent_screenshots:
  agent_chroma:
